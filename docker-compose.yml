services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - wedding-os-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wedding_os"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wedding-os-postgres-data:
